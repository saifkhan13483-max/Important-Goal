          "name": "What is a system in SystemForge?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A system is a simple, repeatable daily action tied to your goal — like walking 20 minutes every morning to get fit. Instead of just saying 'get fit,' a system tells you exactly what to do each day."
          }
        },

          "@type": "Question",
          "name": "Is SystemForge free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The free plan includes up to 2 active goals, 3 active systems, daily check-ins, streak tracking, and basic analytics. No credit card required."
          }
        },
        {
          "@type": "Question",
          "name": "How is SystemForge different from other habit trackers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most habit apps just let you check boxes. SystemForge builds real systems with an identity statement, a trigger, a minimum action, and a fallback plan. It also guides you through a Recovery Flow when you miss a day."
          }
        },

          "@type": "Question",
          "name": "Does SystemForge work on mobile?",
          "acceptedAnswer": {

          }
        }
      ]
    }
    </script>

    <!-- ═══════════════════════════════════════════════
         THEME BOOTSTRAP (prevent FOUC before React)
    ═══════════════════════════════════════════════ -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('sf-app-store');
          var state = stored ? JSON.parse(stored).state : null;
          var theme = state ? state.theme : 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (theme === 'system' && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
